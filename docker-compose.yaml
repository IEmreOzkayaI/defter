services:
  defter-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SITE_URL: ${VITE_SITE_URL:-}
        VITE_LANDING_HERO_VIDEO: ${VITE_LANDING_HERO_VIDEO:-}
        VITE_BACKEND_BASE_URL: ${VITE_BACKEND_BASE_URL:-http://localhost:3001}
    image: defter-web:latest
    container_name: defter-web
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-3000}:8080'
    environment:
      NGINX_PORT: 8080
      IFRAME_ALLOWED_ORIGIN: ${IFRAME_ALLOWED_ORIGIN:-'none'}
      VITE_BACKEND_BASE_URL: ${VITE_BACKEND_BASE_URL:-http://localhost:3001}
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8080/healthz || exit 1']
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
