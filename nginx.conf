server {
  listen ${NGINX_PORT};
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Tarayıcı aynı origin’e gider (/api/...); CORS gerekmez. Upstream: BACKEND_PROXY_TARGET (sonunda / olmalı).
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    proxy_pass ${BACKEND_PROXY_TARGET};
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location /env-config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    try_files $uri =404;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Content-Security-Policy "frame-ancestors ${IFRAME_ALLOWED_ORIGIN};" always;
    try_files $uri $uri/ /index.html;
  }
}
